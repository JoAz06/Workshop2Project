<!doctype html>
<html>
  <head>
    <title>Medical Cost Predictor</title>
  </head>
  <body>
    <h1>Predict Medical Cost</h1>

    <form method="post">
      {% csrf_token %} {{ form.as_p }}
      <button type="submit">Predict</button>
    </form>

    {% if result %}
    <h2>Predicted Cost: ${{ result }}</h2>
    {% endif %}
  </body>
</html>
